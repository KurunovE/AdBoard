server:
  port: 8081

spring:
  application:
    name: AdBoard

  datasource:
    url: jdbc:postgresql://localhost:5432/adboard_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/adboard
          jwk-set-uri: http://localhost:9090/realms/adboard/protocol/openid-connect/certs

jwt:
  auth:
    converter:
      resource-id: adboard-client

logging:
  level:
    org.springframework.security: DEBUG

yandex:
  disk:
    token: ${YANDEX_DISK_TOKEN:y0__xD23eiqBRj8_T8gvIWy_xYwyvPU0AjaOcdQEeUNu-MXXpaSw0V2ZbuSHg}
    api-url: https://cloud-api.yandex.net/v1/disk/resources
