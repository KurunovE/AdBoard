server:
  port: 8081

spring:
  application:
    name: AdBoard

  datasource:
    url: jdbc:postgresql://localhost:5432/adboard_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true