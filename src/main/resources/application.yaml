server:
  port: 8081

spring:
  application:
    name: AdBoard

  datasource:
    url: jdbc:postgresql://localhost:5432/adboard_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/adboard}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:9090/realms/adboard/protocol/openid-connect/certs}

jwt:
  auth:
    converter:
      resource-id: adboard-client

logging:
  level:
    org.springframework.security: DEBUG

yandex:
  disk:
    token: ${YANDEX_DISK_TOKEN:y0__xD23eiqBRj8_T8gvIWy_xYwyvPU0AjaOcdQEeUNu-MXXpaSw0V2ZbuSHg}
    api-url: https://cloud-api.yandex.net/v1/disk/resources

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:9090}
  realm: ${KEYCLOAK_REALM:adboard}
  client-id: ${KEYCLOAK_CLIENT_ID:adboard-client}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:ClmBanN83XyGx0EmyGVOcvsVWcx6Z49w}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:password}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
